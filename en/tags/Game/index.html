<!-- 切换逻辑 -->
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var switcher = document.getElementById('lang-select');
    if (!switcher) return;

    // 根据当前路径预选语言
    var path = window.location.pathname;
    if (path.startsWith('/en/')) {
      switcher.value = 'en';
    } else {
      switcher.value = 'zh';
    }

    // 切换事件
    switcher.addEventListener('change', function() {
      var lang = this.value;
      if (lang === 'zh') {
        // 切换到中文根目录
        window.location.href = '/';
      } else {
        // 切换到英文版（假设放在 /en/ 下）
        window.location.href = '/en/';
      }
    });
  });
</script>

<!-- 加载 SweetAlert2 库 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // 仅匹配下载链接（包含 /releases/download/）
  const btns = document.querySelectorAll('.post-body .btn');

  function getCurrentLang() {
    const htmlLang = document.documentElement.lang;
    if (htmlLang && htmlLang.startsWith('en')) return 'en';
    if (window.location.pathname.startsWith('/en/')) return 'en';
    return 'zh';
  }

  async function fetchEula(lang) {
    const url = lang === 'en' ? '/eula/en.txt' : '/eula/zh.txt';
    const response = await fetch(url);
    if (!response.ok) throw new Error('Failed to load EULA');
    return response.text();
  }

  // 以纯文本显示协议（保留换行和缩进）
  function textToHtml(text) {
    const escape = (str) => {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    };
    return `<pre style="white-space: pre-wrap; font-family: inherit; font-size: 0.95em; line-height: 1.6; margin: 0; padding: 0 10px;">${escape(text)}</pre>`;
  }

  btns.forEach(function(btn) {
    // 只处理下载链接（包含 /releases/download/）
    if (!btn.href.includes('/releases/download/')) return;

    btn.addEventListener('click', function(e) {
      e.preventDefault();
      const downloadUrl = this.href;
      const lang = getCurrentLang();

      Swal.fire({
        title: lang === 'en' ? 'Loading Agreement...' : '加载协议中...',
        text: lang === 'en' ? 'Please wait...' : '请稍候...',
        allowOutsideClick: false,
        didOpen: () => { Swal.showLoading(); }
      });

      fetchEula(lang)
        .then(text => {
          const htmlContent = textToHtml(text);
          Swal.fire({
            title: lang === 'en' ? 'User Agreement' : '用户协议',
            html: `<div style="max-height:400px; overflow-y:auto;">${htmlContent}</div>`,
            icon: 'info',
            showCancelButton: true,
            confirmButtonText: lang === 'en' ? 'I Agree' : '我同意',
            cancelButtonText: lang === 'en' ? 'Cancel' : '取消',
            reverseButtons: true,
            width: 650,
            confirmButtonColor: '#3085d6',
            cancelButtonColor: '#d33'
          }).then((result) => {
            if (result.isConfirmed) {
              window.location.href = downloadUrl;
            } else {
              window.location.href = 'https://j-e-f-f-r-e-y.github.io';
            }
          });
        })
        .catch(err => {
          Swal.fire({
            icon: 'error',
            title: lang === 'en' ? 'Error' : '错误',
            text: lang === 'en' ? 'Failed to load agreement. Please try again later.' : '加载协议失败，请稍后重试。'
          });
        });
    });
  });
});
</script>
